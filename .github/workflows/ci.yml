name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run lint
        run: composer lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['6.4', '7.4', '8.0']
        exclude:
          - php: '8.2'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.0'

    services:
      rabbitmq:
        image: rabbitmq:4.1-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest

    steps:
      - uses: actions/checkout@v4

      - name: Start RabbitMQ SSL container
        run: |
          docker run -d --name rabbitmq-ssl \
            -p 5671:5671 \
            -v ${{ github.workspace }}/docker/rabbitmq/ssl:/etc/rabbitmq/ssl:ro \
            --entrypoint sh \
            rabbitmq:4.1-management-alpine \
            -c "cp /etc/rabbitmq/ssl/rabbitmq.conf /etc/rabbitmq/rabbitmq.conf && rabbitmq-server"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: amqp
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer require symfony/messenger:^${{ matrix.symfony }} symfony/console:^${{ matrix.symfony }} symfony/dependency-injection:^${{ matrix.symfony }} --no-interaction
          composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: composer test-unit

      - name: Wait for RabbitMQ
        run: |
          for i in {1..30}; do
            if nc -z localhost 5672 2>/dev/null && nc -z localhost 5671 2>/dev/null; then
              echo "RabbitMQ is ready (both standard and SSL)"
              exit 0
            fi
            echo "Waiting for RabbitMQ... ($i/30)"
            sleep 2
          done
          echo "RabbitMQ not ready"
          exit 1

      - name: Run E2E tests
        run: composer test-e2e
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_SSL_PORT: 5671
          RABBITMQ_USER: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: /
          RABBITMQ_SSL_CA_CERT: ${{ github.workspace }}/tests/E2E/ssl/ca_certificate.pem

  ci:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Some jobs failed"
            exit 1
          fi
          echo "All jobs passed"

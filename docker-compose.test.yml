services:
    rabbitmq:
        image: rabbitmq:4.1-management-alpine
        container_name: the-consoomer-rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 5s
            timeout: 10s
            retries: 5
        tmpfs:
            - /var/lib/rabbitmq

    rabbitmq-ssl:
        image: rabbitmq:4.1-management-alpine
        container_name: the-consoomer-rabbitmq-ssl
        ports:
            - "5673:5672"
            - "5671:5671"
            - "15673:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        volumes:
            - ./docker/rabbitmq/ssl:/etc/rabbitmq/ssl:ro
        command: >
            sh -c "
            cp /etc/rabbitmq/ssl/rabbitmq.conf /etc/rabbitmq/rabbitmq.conf &&
            rabbitmq-server"
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 5s
            timeout: 10s
            retries: 5
        tmpfs:
            - /var/lib/rabbitmq

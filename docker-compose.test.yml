version: '3.8'

services:
    rabbitmq:
        image: rabbitmq:4.1-management-alpine
        container_name: the-consoomer-rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 5s
            timeout: 10s
            retries: 5
        tmpfs:
            - /var/lib/rabbitmq
